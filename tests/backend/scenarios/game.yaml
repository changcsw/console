# 模块 game（游戏主数据 Game Core）接口场景矩阵 manifest
# 维度定义见 docs/architecture/v2/03-testing.md §4；逐接口适用维度见
# docs/architecture/v2/modules/11-game/spec.compact.md。
#
# 运行说明（与 auth.yaml 同）：
#   进程内 httptest harness（services/admin-api/internal/testkit/scenario）为降级 handler
#   （无 POSTGRES_DSN/ADMIN_JWT_SECRET → ready=false），无法签发可通过校验的令牌，也无法落库。
#   因此：
#     - requiresDB: false 的 case（S2 鉴权 401：受保护接口先过 Authn，未携带/无效令牌即 401）
#       在沙箱内真实执行并断言。
#     - requiresDB: true 的 case 为「manifest 已声明但运行需 PG + 全装配」，进程内 harness 跳过
#       （SCENARIO_WITH_DB=1 时由连库 harness 执行），仅保证 YAML 被解析校验通过。
#       这些维度已由 transport/http/games 进程内 httptest（内存仓储 + 真实逻辑）等价覆盖。
#
# auth.role → 实体（连库 harness 用以签发令牌；见 tests/fixtures/sandbox/game.sql 注释）：
#   game_admin  → game.read + game.write（S1/S5/S6/S7/S8/S9/S10 跑通）
#   game_reader → 仅 game.read（验缺写权限 403；可读列表/详情）
#   no_perm     → 无任何权限（验缺读权限 403）
module: game
cases:
  # ───────────────────────── 1. GET /games — 列表（game.read）
  - name: list_requires_auth
    dimension: S2
    requiresDB: false
    note: "未携带 access → 401（Authn 在 RequireBackend 之前）"
    request:
      method: GET
      path: /api/admin/games
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: list_forbidden_without_perm
    dimension: S3
    requiresDB: true
    auth: { role: no_perm }
    note: "登录但缺 game.read → 403 FORBIDDEN"
    request:
      method: GET
      path: /api/admin/games
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: list_success
    dimension: S1
    requiresDB: true
    fixture: sandbox/game/list
    auth: { role: game_reader }
    note: "200 + 统一包络；items 为轻量摘要（markets 计数 + 默认）"
    request:
      method: GET
      path: /api/admin/games
    expect:
      status: 200
  - name: list_omits_game_secret
    dimension: S8
    requiresDB: true
    fixture: sandbox/game/list
    auth: { role: game_reader }
    note: "列表项绝不返回 gameSecret 字段"
    request:
      method: GET
      path: /api/admin/games
    expect:
      status: 200
  - name: list_invalid_status_query
    dimension: S4
    requiresDB: true
    auth: { role: game_reader }
    note: "status 非 GameStatus 枚举 → 400 VALIDATION_FAILED"
    request:
      method: GET
      path: /api/admin/games?status=bogus
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: list_invalid_market_query
    dimension: S4
    requiresDB: true
    auth: { role: game_reader }
    note: "marketCode 非 Market 枚举 → 400 VALIDATION_FAILED"
    request:
      method: GET
      path: /api/admin/games?marketCode=US
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: list_pagination
    dimension: S9
    requiresDB: true
    fixture: sandbox/game/list
    auth: { role: game_reader }
    note: "page/pageSize/total 正确，sort=-updatedAt 生效"
    request:
      method: GET
      path: /api/admin/games?page=1&pageSize=20&sort=-updatedAt
    expect:
      status: 200
  - name: list_pagesize_clamped
    dimension: S9
    requiresDB: true
    fixture: sandbox/game/list
    auth: { role: game_reader }
    note: "pageSize 越界按 00 §7.3 钳制为上限 100（非报错）"
    request:
      method: GET
      path: /api/admin/games?pageSize=99999
    expect:
      status: 200
      jsonContains: { data.pageSize: 100 }
  - name: list_scoped_to_current_env
    dimension: S6
    requiresDB: true
    fixture: sandbox/game/list
    auth: { role: game_reader }
    note: "隐式作用域=当前 env schema（search_path 决定）；不跨 schema 读"
    request:
      method: GET
      path: /api/admin/games
    expect:
      status: 200

  # ───────────────────────── 2. POST /games — 创建（game.write，审计 game.create）
  - name: create_requires_auth
    dimension: S2
    requiresDB: false
    request:
      method: POST
      path: /api/admin/games
      body: { name: "Demo", alias: "demo-game" }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: create_forbidden_without_perm
    dimension: S3
    requiresDB: true
    auth: { role: game_reader }
    note: "仅 game.read 缺 game.write → 403"
    request:
      method: POST
      path: /api/admin/games
      body: { name: "Demo", alias: "demo-game" }
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: create_validation_missing_name
    dimension: S4
    requiresDB: true
    auth: { role: game_admin }
    note: "缺 name → 400 VALIDATION_FAILED（details 给 field/reason）"
    request:
      method: POST
      path: /api/admin/games
      body: { alias: "demo-game" }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: create_validation_bad_alias
    dimension: S4
    requiresDB: true
    auth: { role: game_admin }
    note: "alias 含非法字符（空格）→ 400"
    request:
      method: POST
      path: /api/admin/games
      body: { name: "Demo", alias: "bad alias" }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: create_conflict_alias
    dimension: S5
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "alias 已存在（同 env 唯一）→ 409 CONFLICT（message: alias already exists）"
    request:
      method: POST
      path: /api/admin/games
      body: { name: "Dup", alias: "demo-game" }
    expect:
      status: 409
      jsonContains: { error.code: CONFLICT }
  - name: create_success
    dimension: S1
    requiresDB: true
    auth: { role: game_admin }
    note: "201 + 完整聚合；game_id 从 100000 起自增；自动建默认 GLOBAL 市场"
    request:
      method: POST
      path: /api/admin/games
      body: { name: "Brand New", alias: "brand-new" }
    expect:
      status: 201
      jsonContains: { data.defaultMarketCode: "GLOBAL" }
  - name: create_returns_plaintext_secret_once
    dimension: S8
    requiresDB: true
    auth: { role: game_admin }
    note: "仅 POST 201 一次性返明文 gameSecret（secretMasked=false）；之后任何接口脱敏"
    request:
      method: POST
      path: /api/admin/games
      body: { name: "Secret Once", alias: "secret-once" }
    expect:
      status: 201
      jsonContains: { data.secretMasked: false }
  - name: create_lands_in_current_schema
    dimension: S6
    requiresDB: true
    auth: { role: game_admin }
    note: "落当前运行环境 schema；忽略前端传入的 env/gameId/gameSecret，不跨 schema 写"
    request:
      method: POST
      path: /api/admin/games
      body: { name: "Env Scoped", alias: "env-scoped", gameId: "999", gameSecret: "x" }
    expect:
      status: 201
  - name: create_writes_audit
    dimension: S7
    requiresDB: true
    auth: { role: game_admin }
    note: "写 audit_logs(action=game.create, resource=game, detail 不含明文 secret)"
    request:
      method: POST
      path: /api/admin/games
      body: { name: "Audited", alias: "audited" }
    expect:
      status: 201
  - name: create_transaction_rollback
    dimension: S10
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "games + 默认 market 单事务；alias 冲突中止 → 整体回滚，无 game_id 占用/无孤儿 market"
    request:
      method: POST
      path: /api/admin/games
      body: { name: "Rollback", alias: "demo-game" }
    expect:
      status: 409
      jsonContains: { error.code: CONFLICT }

  # ───────────────────────── 3. GET /games/{gameId} — 详情（game.read）
  - name: get_requires_auth
    dimension: S2
    requiresDB: false
    request:
      method: GET
      path: /api/admin/games/100001
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: get_forbidden_without_perm
    dimension: S3
    requiresDB: true
    auth: { role: no_perm }
    request:
      method: GET
      path: /api/admin/games/100001
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: get_success
    dimension: S1
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_reader }
    note: "200 + 完整聚合（基础信息 + env + markets[] + legalLinks[]）"
    request:
      method: GET
      path: /api/admin/games/100001
    expect:
      status: 200
      jsonContains: { data.gameId: "100001" }
  - name: get_not_found
    dimension: S1
    requiresDB: true
    auth: { role: game_reader }
    note: "当前 schema 内不存在 → 404 NOT_FOUND"
    request:
      method: GET
      path: /api/admin/games/999999
    expect:
      status: 404
      jsonContains: { error.code: NOT_FOUND }
  - name: get_masks_game_secret
    dimension: S8
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_reader }
    note: "详情恒脱敏：gameSecret=\"masked\" / secretMasked=true"
    request:
      method: GET
      path: /api/admin/games/100001
    expect:
      status: 200
      jsonContains: { data.gameSecret: "masked", data.secretMasked: true }

  # ───────────────────────── 4. PATCH /games/{gameId} — 编辑基础信息（game.write，审计 game.update）
  - name: update_requires_auth
    dimension: S2
    requiresDB: false
    request:
      method: PATCH
      path: /api/admin/games/100001
      body: { name: "New" }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: update_forbidden_without_perm
    dimension: S3
    requiresDB: true
    auth: { role: game_reader }
    request:
      method: PATCH
      path: /api/admin/games/100001
      body: { name: "New" }
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: update_validation_bad_status
    dimension: S4
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "status 非枚举 → 400"
    request:
      method: PATCH
      path: /api/admin/games/100001
      body: { status: "archived" }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: update_default_market_not_enabled
    dimension: S4
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "改 defaultMarketCode 到未启用 market → 400(defaultMarketCode must be an enabled market)"
    request:
      method: PATCH
      path: /api/admin/games/100001
      body: { defaultMarketCode: "CN" }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: update_conflict_alias
    dimension: S5
    requiresDB: true
    fixture: sandbox/game/list
    auth: { role: game_admin }
    note: "改 alias 为另一游戏已用别名（同 env 唯一）→ 409 CONFLICT"
    request:
      method: PATCH
      path: /api/admin/games/100002
      body: { alias: "demo-game" }
    expect:
      status: 409
      jsonContains: { error.code: CONFLICT }
  - name: update_success
    dimension: S1
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "active 状态机流转 + 改 name → 200 返回同详情结构"
    request:
      method: PATCH
      path: /api/admin/games/100001
      body: { name: "Renamed", status: "active" }
    expect:
      status: 200
      jsonContains: { data.status: "active" }
  - name: update_writes_audit
    dimension: S7
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "写 audit_logs(action=game.update, detail 记变更字段)"
    request:
      method: PATCH
      path: /api/admin/games/100001
      body: { name: "Renamed2" }
    expect:
      status: 200
  - name: update_scoped_to_current_env
    dimension: S6
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "不接受切换 env；写落当前 schema"
    request:
      method: PATCH
      path: /api/admin/games/100001
      body: { name: "Env Stay" }
    expect:
      status: 200
  - name: update_transaction_rollback
    dimension: S10
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "games 列更新 + default_market_code 回写 game_markets.is_default 必须原子；非法默认市场中止整体回滚"
    request:
      method: PATCH
      path: /api/admin/games/100001
      body: { defaultMarketCode: "CN" }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }

  # ───────────────────────── 5. PUT /games/{gameId}/markets — 全量覆盖市场（game.write，审计 game.markets.update）
  - name: markets_requires_auth
    dimension: S2
    requiresDB: false
    request:
      method: PUT
      path: /api/admin/games/100001/markets
      body: { markets: [{ marketCode: "GLOBAL", isDefault: true }] }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: markets_forbidden_without_perm
    dimension: S3
    requiresDB: true
    auth: { role: game_reader }
    request:
      method: PUT
      path: /api/admin/games/100001/markets
      body: { markets: [{ marketCode: "GLOBAL", isDefault: true }] }
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: markets_validation_multiple_defaults
    dimension: S4
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "多默认 → 400(exactly one default market is required)"
    request:
      method: PUT
      path: /api/admin/games/100001/markets
      body: { markets: [{ marketCode: "GLOBAL", isDefault: true }, { marketCode: "JP", isDefault: true }] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: markets_validation_missing
    dimension: S4
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "缺/空 markets → 400（必填非空）"
    request:
      method: PUT
      path: /api/admin/games/100001/markets
      body: {}
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: markets_validation_default_not_enabled
    dimension: S4
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "被标默认的市场 enabled=false → 400(default market must be enabled)；与 PATCH defaultMarketCode 须为已启用 market 语义一致"
    request:
      method: PUT
      path: /api/admin/games/100001/markets
      body: { markets: [{ marketCode: "GLOBAL", isDefault: true, enabled: false }, { marketCode: "JP", isDefault: false, enabled: true }] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: markets_success
    dimension: S1
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "全量覆盖 + 回写 default_market_code → 200"
    request:
      method: PUT
      path: /api/admin/games/100001/markets
      body: { markets: [{ marketCode: "GLOBAL", isDefault: false, enabled: true }, { marketCode: "JP", isDefault: true, enabled: true, defaultLocale: "ja-JP" }] }
    expect:
      status: 200
      jsonContains: { data.defaultMarketCode: "JP" }
  - name: markets_conflict_remove_default
    dimension: S5
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "移除当前默认市场（GLOBAL）→ 409 CONFLICT(cannot remove the default market)"
    request:
      method: PUT
      path: /api/admin/games/100001/markets
      body: { markets: [{ marketCode: "JP", isDefault: true, enabled: true }] }
    expect:
      status: 409
      jsonContains: { error.code: CONFLICT }
  - name: markets_conflict_remove_referenced
    dimension: S5
    requiresDB: true
    fixture: sandbox/game/referenced_market
    auth: { role: game_admin }
    note: "移除被渠道实例引用的 market → 409(cannot remove market with existing channels)。channel 落地前删除保护降级(CountChannelsByMarket 恒 0)，连库 harness 暂跳过；进程内 httptest 用注入计数等价覆盖。"
    request:
      method: PUT
      path: /api/admin/games/100001/markets
      body: { markets: [{ marketCode: "GLOBAL", isDefault: true, enabled: true }] }
    expect:
      status: 409
      jsonContains: { error.code: CONFLICT }
  - name: markets_writes_audit
    dimension: S7
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "写 audit_logs(action=game.markets.update)"
    request:
      method: PUT
      path: /api/admin/games/100001/markets
      body: { markets: [{ marketCode: "GLOBAL", isDefault: true, enabled: true }] }
    expect:
      status: 200
  - name: markets_scoped_to_current_env
    dimension: S6
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "写落当前 schema，不跨 env"
    request:
      method: PUT
      path: /api/admin/games/100001/markets
      body: { markets: [{ marketCode: "GLOBAL", isDefault: true, enabled: true }] }
    expect:
      status: 200
  - name: markets_transaction_rollback
    dimension: S10
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "删除保护 + 全量覆盖 + 回写 default_market_code 单事务；冲突中止整体回滚（市场集合不变）"
    request:
      method: PUT
      path: /api/admin/games/100001/markets
      body: { markets: [{ marketCode: "JP", isDefault: true, enabled: true }] }
    expect:
      status: 409
      jsonContains: { error.code: CONFLICT }

  # ───────────────────────── 6. PUT /games/{gameId}/legal-links — 全量覆盖法务链接（game.write，审计 game.legal.update）
  - name: legal_requires_auth
    dimension: S2
    requiresDB: false
    request:
      method: PUT
      path: /api/admin/games/100001/legal-links
      body: { legalLinks: [{ scopeType: "default", scopeValue: "*" }] }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: legal_forbidden_without_perm
    dimension: S3
    requiresDB: true
    auth: { role: game_reader }
    request:
      method: PUT
      path: /api/admin/games/100001/legal-links
      body: { legalLinks: [{ scopeType: "default", scopeValue: "*" }] }
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: legal_validation_bad_scope_type
    dimension: S4
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "scopeType 非 default/market/locale → 400"
    request:
      method: PUT
      path: /api/admin/games/100001/legal-links
      body: { legalLinks: [{ scopeType: "region", scopeValue: "x" }] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: legal_validation_bad_market_value
    dimension: S4
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "market scopeValue 非 Market 枚举 → 400"
    request:
      method: PUT
      path: /api/admin/games/100001/legal-links
      body: { legalLinks: [{ scopeType: "market", scopeValue: "US" }] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: legal_success
    dimension: S1
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "逐项校验 scope + 去重 → 200 返回写入后完整 legalLinks 数组"
    request:
      method: PUT
      path: /api/admin/games/100001/legal-links
      body: { legalLinks: [{ scopeType: "default", scopeValue: "*", termsUrl: "https://a.com/t" }, { scopeType: "market", scopeValue: "JP" }, { scopeType: "locale", scopeValue: "en-US" }] }
    expect:
      status: 200
  - name: legal_conflict_duplicate_scope
    dimension: S5
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "(scopeType, scopeValue) 重复 → 409 CONFLICT"
    request:
      method: PUT
      path: /api/admin/games/100001/legal-links
      body: { legalLinks: [{ scopeType: "market", scopeValue: "JP" }, { scopeType: "market", scopeValue: "JP" }] }
    expect:
      status: 409
      jsonContains: { error.code: CONFLICT }
  - name: legal_writes_audit
    dimension: S7
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "写 audit_logs(action=game.legal.update)"
    request:
      method: PUT
      path: /api/admin/games/100001/legal-links
      body: { legalLinks: [{ scopeType: "default", scopeValue: "*" }] }
    expect:
      status: 200
  - name: legal_scoped_to_current_env
    dimension: S6
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "写落当前 schema，不跨 env"
    request:
      method: PUT
      path: /api/admin/games/100001/legal-links
      body: { legalLinks: [{ scopeType: "default", scopeValue: "*" }] }
    expect:
      status: 200
  - name: legal_transaction_rollback
    dimension: S10
    requiresDB: true
    fixture: sandbox/game/base
    auth: { role: game_admin }
    note: "全量覆盖(delete+insert)单事务；重复 scope 中止整体回滚，原 legalLinks 不变"
    request:
      method: PUT
      path: /api/admin/games/100001/legal-links
      body: { legalLinks: [{ scopeType: "market", scopeValue: "JP" }, { scopeType: "market", scopeValue: "JP" }] }
    expect:
      status: 409
