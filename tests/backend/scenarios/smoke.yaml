module: smoke
cases:
  - name: healthz_ok
    dimension: S1
    request:
      method: GET
      path: /healthz
    expect:
      status: 200
      jsonContains:
        status: ok

  - name: me_requires_auth
    dimension: S1
    request:
      method: GET
      path: /api/admin/me
    expect:
      status: 401
      jsonContains:
        error.code: UNAUTHENTICATED

  - name: games_list_requires_auth
    dimension: S2
    request:
      method: GET
      path: /api/admin/games
    expect:
      status: 401
      jsonContains:
        error.code: UNAUTHENTICATED

  # sync/preview 已迁移为受保护真实路由（sync.preview 权限）；smoke 仅验鉴权闸门。
  # 完整 S1–S10 场景见 tests/backend/scenarios/sync.yaml。
  - name: sync_preview_requires_auth
    dimension: S2
    request:
      method: POST
      path: /api/admin/games/100001/sync/preview
      body:
        sections: ["channels"]
    expect:
      status: 401
      jsonContains:
        error.code: UNAUTHENTICATED
