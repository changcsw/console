# 模块 game-cashier（游戏级收银台 / 模块 18）接口场景矩阵 manifest
# 维度定义见 docs/architecture/v2/03-testing.md §4；契约来源：
# docs/architecture/v2/modules/18-game-cashier/spec.compact.md。
# 接口前缀 /api/admin/games/{gameId}/cashier；读 cashier.read / 写 cashier.write。
#
# 运行说明（与 cashier-template.yaml 一致）：
#   进程内 httptest harness（services/admin-api/internal/testkit/scenario）为降级 handler
#   （无 POSTGRES_DSN/ADMIN_JWT_SECRET → ready=false）。game-cashier 路由形状已在降级路由挂载
#   （admin_wiring.go degraded → cashierhttp.RegisterRoutes），故：
#     - requiresDB: false 的 S2 用例（受保护接口先过 Authn，未携带/无效令牌即 401）在沙箱内真实执行并断言。
#     - requiresDB: true 的用例为「manifest 已声明但运行需 PG + 全装配」，进程内 harness 跳过
#       （SCENARIO_WITH_DB=1 时由连库 harness 执行），仅保证 YAML 解析校验通过。
#       这些维度已由 transport/http/cashier 进程内 httptest（内存仓储 + 真实 JWT/审计 spy）
#       等价覆盖（见 game_cashier_http_test.go）。
#
# 维度适用性（compact + 03-testing §4）：
#   - 两表为「游戏维度业务表」，每环境 schema 各一份、无 env 列；运行时 search_path=<env>,platform。
#     S6「跨 env」= 写恒落「当前运行环境对应 schema」（由 search_path 决定），业务 SQL 不带 env 谓词、
#     不允许前端指定/跨 schema 写；连库 harness 以 search_path 在 develop/sandbox/production 验证隔离。
#   - S8 脱敏 N/A：本模块无 secret/file 密文字段（价格/校验和均为明文业务数据）。
#   - S9 分页 N/A：GET /profile 为单对象；GET /price-overrides 全量返回 items[]，无分页入参。
#   - S10：PUT /profile 为单表 upsert → N/A；PUT /price-overrides 为「全量替换」批量写，覆盖 S10。
#
# 集成修复记录（已修复，见模块 handoff / integration.checklist）：
#   - cashier-template（#17）发布流程已在发布时计算并写入确定性 version.checksum
#     （domaincashier.ComputeVersionChecksum）；#18 BindProfile 不再硬闸空 checksum，按 compact 仅校验
#     templateId 存在 + 目标版本为 published，原样记录该版本 checksum → 生产 API 绑定主流程可达。
#   - PUT /price-overrides 已在应用层预检 items 内重复 (country,region,currency,priceId) →
#     400 VALIDATION_FAILED（不再连库命中 gcpo_key UNIQUE 的 409）。
#
# auth.role → 实体（连库 harness 用以签发令牌；见 tests/fixtures/sandbox/game-cashier.sql）：
#   cashier_admin  → cashier.read + cashier.write（S1/S4/S5/S7/S10 跑通）
#   cashier_reader → 仅 cashier.read（验缺写权限 403；可读 profile/overrides）
#   no_perm        → 无任何权限（验缺读权限 403）
module: game-cashier
cases:
  # ───────────────────────── 1) GET /profile — 读绑定快照（cashier.read）
  - name: get_profile_requires_auth
    dimension: S2
    requiresDB: false
    note: "未携带 access → 401（Authn 在 RequireBackend 之前）"
    request:
      method: GET
      path: /api/admin/games/100001/cashier/profile
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: get_profile_forbidden_without_perm
    dimension: S3
    requiresDB: true
    auth: { role: no_perm }
    note: "登录但缺 cashier.read → 403 FORBIDDEN"
    request:
      method: GET
      path: /api/admin/games/100001/cashier/profile
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: get_profile_success
    dimension: S1
    requiresDB: true
    auth: { role: cashier_reader }
    fixture: sandbox/game-cashier/bound
    note: "200 + { templateId, appliedTemplateVersion, snapshotChecksum, appliedAt }"
    request:
      method: GET
      path: /api/admin/games/100001/cashier/profile
    expect:
      status: 200
      jsonContains: { data.templateId: "global_default" }
  - name: get_profile_unbound_not_found
    dimension: S4
    requiresDB: true
    auth: { role: cashier_reader }
    fixture: sandbox/game-cashier/base
    note: "游戏存在但未绑定 profile → 404 NOT_FOUND（前端据此映射空态）"
    request:
      method: GET
      path: /api/admin/games/100001/cashier/profile
    expect:
      status: 404
      jsonContains: { error.code: NOT_FOUND }
  - name: get_profile_current_env_schema
    dimension: S6
    requiresDB: true
    auth: { role: cashier_reader }
    fixture: sandbox/game-cashier/bound
    note: "业务表：读当前 env schema（search_path 决定），无 env 列、不跨 schema"
    request:
      method: GET
      path: /api/admin/games/100001/cashier/profile
    expect:
      status: 200

  # ───────────────────────── 2) PUT /profile — 绑定/升级版本（cashier.write，审计 cashier.profile.bind）
  - name: bind_profile_requires_auth
    dimension: S2
    requiresDB: false
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/profile
      body: { templateId: "global_default", templateVersion: "1" }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: bind_profile_forbidden_without_write
    dimension: S3
    requiresDB: true
    auth: { role: cashier_reader }
    note: "仅 cashier.read 缺 cashier.write → 403"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/profile
      body: { templateId: "global_default", templateVersion: "1" }
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: bind_profile_validation_missing_template
    dimension: S4
    requiresDB: true
    auth: { role: cashier_admin }
    note: "缺 templateId → 400 VALIDATION_FAILED"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/profile
      body: { templateVersion: "1" }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: bind_profile_validation_bad_version
    dimension: S4
    requiresDB: true
    auth: { role: cashier_admin }
    note: "templateVersion 非数字/<=0 → 400 VALIDATION_FAILED"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/profile
      body: { templateId: "global_default", templateVersion: "abc" }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: bind_profile_template_not_found
    dimension: S4
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/base
    note: "模板不存在 → 404 NOT_FOUND"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/profile
      body: { templateId: "ghost", templateVersion: "1" }
    expect:
      status: 404
      jsonContains: { error.code: NOT_FOUND }
  - name: bind_profile_draft_conflict
    dimension: S5
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/with_draft
    note: "绑定 draft（非 published）版本 → 409 CONFLICT"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/profile
      body: { templateId: "global_default", templateVersion: "1" }
    expect:
      status: 409
      jsonContains: { error.code: CONFLICT }
  - name: bind_profile_success
    dimension: S1
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/publishable_with_checksum
    note: "200 + 快照（templateId/appliedTemplateVersion/snapshotChecksum/appliedAt）。fixture seed published 版本 checksum；API 发布路径亦已计算 checksum"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/profile
      body: { templateId: "global_default", templateVersion: "1" }
    expect:
      status: 200
      jsonContains: { data.templateId: "global_default", data.appliedTemplateVersion: "1" }
  - name: bind_profile_writes_audit
    dimension: S7
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/publishable_with_checksum
    note: "写 audit_logs(action=cashier.profile.bind)"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/profile
      body: { templateId: "global_default", templateVersion: "1" }
    expect:
      status: 200
  - name: bind_profile_lands_in_current_env_schema
    dimension: S6
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/publishable_with_checksum
    note: "业务表：写落当前 env schema（search_path 决定），不随前端 env 切换、不跨 schema"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/profile
      body: { templateId: "global_default", templateVersion: "1" }
    expect:
      status: 200
  # S10：PUT /profile 为单表 upsert（game_cashier_profiles）→ 事务回滚 N/A（无多表写）。

  # ───────────────────────── 3) GET /price-overrides — 覆盖列表（cashier.read）
  - name: list_overrides_requires_auth
    dimension: S2
    requiresDB: false
    request:
      method: GET
      path: /api/admin/games/100001/cashier/price-overrides
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: list_overrides_forbidden_without_perm
    dimension: S3
    requiresDB: true
    auth: { role: no_perm }
    request:
      method: GET
      path: /api/admin/games/100001/cashier/price-overrides
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: list_overrides_success
    dimension: S1
    requiresDB: true
    auth: { role: cashier_reader }
    fixture: sandbox/game-cashier/with_overrides
    note: "200 + items[]（覆盖行，金额为 minor）"
    request:
      method: GET
      path: /api/admin/games/100001/cashier/price-overrides
    expect:
      status: 200
  - name: list_overrides_current_env_schema
    dimension: S6
    requiresDB: true
    auth: { role: cashier_reader }
    fixture: sandbox/game-cashier/with_overrides
    note: "业务表：读当前 env schema，无 env 列、不跨 schema"
    request:
      method: GET
      path: /api/admin/games/100001/cashier/price-overrides
    expect:
      status: 200
  # S9 分页 N/A：全量返回 items[]，无 page/pageSize 入参。

  # ───────────────────────── 4) PUT /price-overrides — 全量替换 + 归一化（cashier.write，审计 cashier.override.update）
  - name: save_overrides_requires_auth
    dimension: S2
    requiresDB: false
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/price-overrides
      body: { items: [] }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: save_overrides_forbidden_without_write
    dimension: S3
    requiresDB: true
    auth: { role: cashier_reader }
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/price-overrides
      body: { items: [] }
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: save_overrides_currency_not_supported
    dimension: S4
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/base
    note: "currency 不在 platform.currency_specs → 400 CURRENCY_NOT_SUPPORTED"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/price-overrides
      body: { items: [{ countryCode: "DE", regionCode: "*", currency: "EUR", priceId: "p", preTaxAmountMinor: 1000, taxRate: "0", taxAmountMinor: 0, afterTaxAmountMinor: 1000, reason: "", effectiveAt: "2026-01-01T00:00:00Z" }] }
    expect:
      status: 400
      jsonContains: { error.code: CURRENCY_NOT_SUPPORTED }
  - name: save_overrides_below_minimum
    dimension: S4
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/base
    note: "金额低于 currency_specs 下限（USD min_amount_minor）→ 400 VALIDATION_FAILED"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/price-overrides
      body: { items: [{ countryCode: "US", regionCode: "*", currency: "USD", priceId: "p", preTaxAmountMinor: 10, taxRate: "0", taxAmountMinor: 0, afterTaxAmountMinor: 10, reason: "", effectiveAt: "2026-01-01T00:00:00Z" }] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: save_overrides_invalid_effective_at
    dimension: S4
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/base
    note: "effectiveAt 非 RFC3339 → 400 VALIDATION_FAILED（handler 早校验）"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/price-overrides
      body: { items: [{ countryCode: "US", regionCode: "*", currency: "USD", priceId: "p", preTaxAmountMinor: 1000, taxRate: "0.1", taxAmountMinor: 100, afterTaxAmountMinor: 1100, reason: "", effectiveAt: "not-a-time" }] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: save_overrides_duplicate_key_prevalidated
    dimension: S4
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/base
    note: "items 内重复 (country,region,currency,priceId) 由服务层预检 → 400 VALIDATION_FAILED（不再连库命中 gcpo_key UNIQUE 的 409）"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/price-overrides
      body: { items: [{ countryCode: "US", regionCode: "*", currency: "USD", priceId: "p_basic", preTaxAmountMinor: 1000, taxRate: "0.1", taxAmountMinor: 100, afterTaxAmountMinor: 1100, reason: "a", effectiveAt: "2026-01-01T00:00:00Z" }, { countryCode: "US", regionCode: "*", currency: "USD", priceId: "p_basic", preTaxAmountMinor: 2000, taxRate: "0.1", taxAmountMinor: 200, afterTaxAmountMinor: 2200, reason: "b", effectiveAt: "2026-01-01T00:00:00Z" }] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: save_overrides_success_normalizes
    dimension: S1
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/base
    note: "200 + items[]；金额按 00 §5 校验归一化（minor），整体替换式"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/price-overrides
      body: { items: [{ countryCode: "US", regionCode: "*", currency: "USD", priceId: "p_basic", preTaxAmountMinor: 1000, taxRate: "0.1", taxAmountMinor: 100, afterTaxAmountMinor: 1100, reason: "promo", effectiveAt: "2026-01-01T00:00:00Z" }] }
    expect:
      status: 200
  - name: save_overrides_writes_audit
    dimension: S7
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/base
    note: "写 audit_logs(action=cashier.override.update)"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/price-overrides
      body: { items: [{ countryCode: "US", regionCode: "*", currency: "USD", priceId: "p_basic", preTaxAmountMinor: 1000, taxRate: "0.1", taxAmountMinor: 100, afterTaxAmountMinor: 1100, reason: "promo", effectiveAt: "2026-01-01T00:00:00Z" }] }
    expect:
      status: 200
  - name: save_overrides_lands_in_current_env_schema
    dimension: S6
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/base
    note: "业务表：写落当前 env schema（search_path 决定），不随前端 env 切换、不跨 schema"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/price-overrides
      body: { items: [{ countryCode: "US", regionCode: "*", currency: "USD", priceId: "p_basic", preTaxAmountMinor: 1000, taxRate: "0.1", taxAmountMinor: 100, afterTaxAmountMinor: 1100, reason: "promo", effectiveAt: "2026-01-01T00:00:00Z" }] }
    expect:
      status: 200
  - name: save_overrides_transaction_atomic
    dimension: S10
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: sandbox/game-cashier/with_overrides
    note: "全量替换（DELETE+INSERT）单事务；批量中任一行归一化失败整体回滚，原有覆盖不被清空/部分写入"
    request:
      method: PUT
      path: /api/admin/games/100001/cashier/price-overrides
      body: { items: [{ countryCode: "US", regionCode: "*", currency: "USD", priceId: "ok", preTaxAmountMinor: 1000, taxRate: "0.1", taxAmountMinor: 100, afterTaxAmountMinor: 1100, reason: "", effectiveAt: "2026-01-01T00:00:00Z" }, { countryCode: "DE", regionCode: "*", currency: "EUR", priceId: "bad", preTaxAmountMinor: 1000, taxRate: "0", taxAmountMinor: 0, afterTaxAmountMinor: 1000, reason: "", effectiveAt: "2026-01-01T00:00:00Z" }] }
    expect:
      status: 400
      jsonContains: { error.code: CURRENCY_NOT_SUPPORTED }
