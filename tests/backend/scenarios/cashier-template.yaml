      status: 201
      jsonContains: { data.status: "pending_review" }
  - name: fx_trigger_auto_apply_publishes
    dimension: S1
    requiresDB: true
    auth: { role: cashier_admin }
    fixture: common/cashier-template/auto_apply_published
    note: "私有维度：auto_apply 触发后自动 approve→publish+applied（候选发布、旧 published 归档）；P4 修复后响应 status 与落库一致（applied）"
    request:
      method: POST
      path: /api/admin/cashier/templates/auto_tpl/fx-sync/runs
    expect:
