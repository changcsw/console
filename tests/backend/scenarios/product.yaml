    request:
      method: GET
      path: /api/admin/channel-packages/7001/products
    expect:
      status: 200

  # ═════════════════════════ 5) PUT /channel-packages/{packageId}/products（整表覆盖写，product.write，审计 product.package_products.update）
  - name: put_package_products_requires_auth
    dimension: S2
    requiresDB: false
    request:
      method: PUT
      path: /api/admin/channel-packages/7001/products
      body: { items: [{ productId: "com.demo.coin" }] }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: put_package_products_forbidden_without_perm
    dimension: S3
    requiresDB: true
    auth: { role: product_reader }
    request:
      method: PUT
      path: /api/admin/channel-packages/7001/products
      body: { items: [{ productId: "com.demo.coin" }] }
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: put_package_products_validation_override_missing
    dimension: S4
    requiresDB: true
    auth: { role: product_admin }
    fixture: sandbox/product/mapping
