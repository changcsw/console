  - name: get_package_products_forbidden_without_perm
    dimension: S3
    requiresDB: true
    auth: { role: no_perm }
    request:
      method: GET
      path: /api/admin/channel-packages/7001/products
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: get_package_products_invalid_id
    dimension: S4
    requiresDB: true
    auth: { role: product_reader }
    note: "packageId 非 int64 → 400 VALIDATION_FAILED"
    request:
      method: GET
      path: /api/admin/channel-packages/not-a-number/products
