      path: /api/admin/channel-packages/7001/products
      body: { items: [{ productId: "com.demo.coin", productIdMode: "override", productIdOverride: "store.coin.id", priceIdMode: "default" }] }
    expect:
      status: 200
  - name: put_package_products_writes_audit
    dimension: S7
    requiresDB: true
    auth: { role: product_admin }
    fixture: sandbox/product/mapping
    note: "写 audit_logs(action=product.package_products.update)"
