      body: { productName: "X" }
    expect:
      status: 404
      jsonContains: { error.code: NOT_FOUND }
  - name: update_product_success_renormalizes
    dimension: S1
    requiresDB: true
    auth: { role: product_admin }
    fixture: sandbox/product/base
    note: "改 baseAmount → 重走归一化；priceId 单独长度校验；200 返回完整商品"
    request:
      method: PATCH
      path: /api/admin/products/com.demo.coin?gameId=100001
      body: { baseAmount: "9.999", priceId: "price_coin_v2" }
    expect:
      status: 200
      jsonContains: { data.baseAmountMinor: 1000 }
  - name: update_product_writes_audit
    dimension: S7
    requiresDB: true
    auth: { role: product_admin }
    fixture: sandbox/product/base
    note: "写 audit_logs(action=product.update, detail 记变更字段)"
    request:
      method: PATCH
      path: /api/admin/products/com.demo.coin?gameId=100001
      body: { productName: "Coin v2" }
    expect:
      status: 200
  - name: update_product_scoped_to_current_env
    dimension: S6
    requiresDB: true
    auth: { role: product_admin }
    fixture: sandbox/product/base
    note: "写落当前 schema，不跨 env"
    request:
      method: PATCH
      path: /api/admin/products/com.demo.coin?gameId=100001
      body: { enabled: false }
    expect:
      status: 200

  # ═════════════════════════ 4) GET /channel-packages/{packageId}/products（读包级映射，product.read）
