      path: /api/admin/channel-packages/7001/products
      body: { items: [{ productId: "com.demo.coin", priceIdMode: "override", priceIdOverride: "" }] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: put_package_products_validation_duplicate
    dimension: S4
    requiresDB: true
    auth: { role: product_admin }
    fixture: sandbox/product/mapping
    note: "items 内 productId 重复 → 400 VALIDATION_FAILED"
    request:
      method: PUT
      path: /api/admin/channel-packages/7001/products
      body: { items: [{ productId: "com.demo.coin" }, { productId: "com.demo.coin" }] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: put_package_products_validation_not_in_game
    dimension: S4
    requiresDB: true
    auth: { role: product_admin }
    fixture: sandbox/product/mapping
    note: "productId 不属该包所属 game → 400 VALIDATION_FAILED"
    request:
      method: PUT
      path: /api/admin/channel-packages/7001/products
      body: { items: [{ productId: "com.not.exist" }] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: put_package_products_validation_override_too_long
