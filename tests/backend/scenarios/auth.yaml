  # ───────────────────────── 7. POST /system/admin-users（admin_user.write）
  - name: create_user_requires_auth
    dimension: S2
    requiresDB: false
    request:
      method: POST
      path: /api/admin/system/admin-users
      body: { userName: "x", displayName: "X" }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: create_user_forbidden_without_perm
    dimension: S3
    requiresDB: true
    auth: { role: system_reader }
    note: "仅 system.read 缺 admin_user.write → 403"
    request:
      method: POST
      path: /api/admin/system/admin-users
      body: { userName: "x", displayName: "X" }
    expect:
      status: 403
      jsonContains: { error.code: FORBIDDEN }
  - name: create_user_validation
    dimension: S4
    requiresDB: true
    auth: { role: super_admin }
    note: "缺必填 userName/displayName 或 password<8 → 400"
    request:
      method: POST
      path: /api/admin/system/admin-users
      body: { displayName: "" }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: create_user_conflict_username
    dimension: S5
    requiresDB: true
    fixture: common/auth/base
    auth: { role: super_admin }
    note: "userName 已存在 → 409 CONFLICT(details.field=userName)"
    request:
      method: POST
      path: /api/admin/system/admin-users
      body: { userName: "admin", displayName: "Dup" }
    expect:
      status: 409
      jsonContains: { error.code: CONFLICT }
  - name: create_user_success
    dimension: S1
    requiresDB: true
    auth: { role: super_admin }
    request:
      method: POST
      path: /api/admin/system/admin-users
      body: { userName: "alice", displayName: "Alice", password: "Alice@12345", roleIds: [] }
    expect:
      status: 200
      jsonContains: { data.userName: "alice" }
  - name: create_user_password_not_echoed
    dimension: S8
    requiresDB: true
    auth: { role: super_admin }
    note: "响应绝不回明文密码/bcrypt 哈希"
    request:
      method: POST
      path: /api/admin/system/admin-users
      body: { userName: "bob", displayName: "Bob", password: "Bob@123456" }
    expect:
      status: 200
  - name: create_user_writes_audit
    dimension: S7
    requiresDB: true
    auth: { role: super_admin }
    note: "写 audit_logs(action=admin_user.create)"
    request:
      method: POST
      path: /api/admin/system/admin-users
      body: { userName: "carol", displayName: "Carol" }
    expect:
      status: 200
  - name: create_user_transaction_rollback
    dimension: S10
    requiresDB: true
    auth: { role: super_admin }
    note: "建用户+身份+角色跨表，中途失败(roleId 不存在)整体回滚，无部分写入"
    request:
      method: POST
      path: /api/admin/system/admin-users
      body: { userName: "dave", displayName: "Dave", roleIds: [999999] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }

