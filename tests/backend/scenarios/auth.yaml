      method: GET
      path: /api/admin/me
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: me_invalid_token_rejected
    dimension: S2
    requiresDB: false
    note: "无效/伪造 Bearer 因签名校验失败 → 401"
    request:
      method: GET
      path: /api/admin/me
      headers: { Authorization: "Bearer not.a.valid.jwt" }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: me_success
    dimension: S1
    requiresDB: true
    auth: { role: super_admin }
    note: "200 + 当前用户/权限/环境"
    request:
      method: GET
      path: /api/admin/me
    expect:
      status: 200
