    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: feishu_callback_unbound_rejected
    dimension: S8
    requiresDB: true
    note: "未绑定 union_id → 401（不自动开户，需先在 system 绑定）"
    request:
      method: POST
      path: /api/admin/auth/feishu/callback
      body: { code: "mock:unbound" }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: feishu_callback_writes_audit
    dimension: S7
    requiresDB: true
    fixture: common/auth/feishu
    note: "成功写 audit_logs(action=admin.login，identityType=feishu)"
    request:
      method: POST
      path: /api/admin/auth/feishu/callback
      body: { code: "mock:alice" }
    expect:
      status: 200

  # ───────────────────────── 5. GET /me（需登录，无特定权限码）
  - name: me_requires_auth
    dimension: S2
    requiresDB: false
    note: "未携带 access → 401"
