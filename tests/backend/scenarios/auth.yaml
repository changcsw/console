  - name: assign_user_roles_transaction_rollback
    dimension: S10
    requiresDB: true
    auth: { role: super_admin }
    note: "删旧建新跨表；roleId 不存在 → 整体回滚不留部分关联"
    request:
      method: PUT
      path: /api/admin/system/admin-users/1/roles
      body: { roleIds: [999999] }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }

