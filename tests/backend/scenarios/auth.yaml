# 模块 auth（后台鉴权与 RBAC）接口场景矩阵 manifest
# 维度定义见 docs/architecture/v2/03-testing.md §4；逐接口适用维度见
# docs/architecture/v2/modules/10-auth/README.md「接口场景矩阵」。
#
# 运行说明（重要）：
#   进程内 httptest harness（services/admin-api/internal/testkit/scenario）使用降级
#   handler（无 POSTGRES_DSN/ADMIN_JWT_SECRET → ready=false），无法签发可通过校验的令牌，
#   也无法落库。因此：
#     - requiresDB: false 的 case（S2 鉴权 401：受保护接口先过 Authn，未携带/无效令牌即 401）
#       在沙箱内真实执行并断言。
#     - requiresDB: true 的 case 为「manifest 已声明但运行需 PG + 全装配」，进程内 harness
#       跳过（SCENARIO_WITH_DB=1 时由连库 harness 执行），仅保证 YAML 被解析校验通过。
module: auth
cases:
  # ───────────────────────── 1. POST /auth/login（公开；S2 豁免，无前置 token）
  - name: login_success
    dimension: S1
    requiresDB: true
    fixture: common/auth/base
    note: "active 管理员密码正确 → 200 + TokenPair + user"
    request:
      method: POST
      path: /api/admin/auth/login
      body: { userName: "admin", password: "Admin@12345" }
    expect:
      status: 200
      jsonContains: { data.user.userName: "admin" }
  - name: login_validation_missing_fields
    dimension: S4
    requiresDB: true
    note: "缺 userName/password → 400 VALIDATION_FAILED"
    request:
      method: POST
      path: /api/admin/auth/login
      body: { userName: "" }
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }
  - name: login_unknown_user_enumeration_guard
    dimension: S8
    requiresDB: true
    note: "用户不存在 → 401（与密码错同一错误，防枚举）"
    request:
      method: POST
      path: /api/admin/auth/login
      body: { userName: "ghost", password: "whatever1" }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: login_wrong_password_enumeration_guard
    dimension: S8
    requiresDB: true
    fixture: common/auth/base
    note: "密码错误 → 401（与用户不存在同一错误，防枚举）"
    request:
      method: POST
      path: /api/admin/auth/login
      body: { userName: "admin", password: "wrong-password" }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: login_disabled_user_rejected
    dimension: S8
    requiresDB: true
    fixture: common/auth/disabled
    note: "禁用即拒绝：status=disabled 任意身份不能登录 → 401"
    request:
      method: POST
      path: /api/admin/auth/login
      body: { userName: "disabled_user", password: "Admin@12345" }
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: login_writes_audit
    dimension: S7
    requiresDB: true
    fixture: common/auth/base
    note: "成功登录写一条 audit_logs(action=admin.login，detail 不含密码)"
    request:
      method: POST
      path: /api/admin/auth/login
      body: { userName: "admin", password: "Admin@12345" }
    expect:
      status: 200

  # ───────────────────────── 2. POST /auth/refresh（公开，凭 refresh）
  - name: refresh_success
    dimension: S1
    requiresDB: true
    fixture: common/auth/base
    note: "有效 refresh(typ=refresh) + 账号 active → 重解析权限签发新 access"
    request:
      method: POST
      path: /api/admin/auth/refresh
      body: { refreshToken: "<valid-refresh-jwt>" }
    expect:
      status: 200
  - name: refresh_validation_missing_token
    dimension: S4
    requiresDB: true
    note: "缺 refreshToken → 400 VALIDATION_FAILED"
    request:
      method: POST
      path: /api/admin/auth/refresh
      body: {}
    expect:
      status: 400
      jsonContains: { error.code: VALIDATION_FAILED }

  # ───────────────────────── 3. POST /auth/logout（需登录）
  - name: logout_requires_auth
    dimension: S2
    requiresDB: false
    note: "未携带 access → 401（Authn 在 readyMW 之前）"
    request:
      method: POST
      path: /api/admin/auth/logout
      body: {}
    expect:
      status: 401
      jsonContains: { error.code: UNAUTHENTICATED }
  - name: logout_success
    dimension: S1
    requiresDB: true
    note: "登录态登出 → 200 {loggedOut:true}"
    auth: { role: super_admin }
    request:
      method: POST
      path: /api/admin/auth/logout
      body: {}
    expect:
      status: 200
  - name: logout_writes_audit
    dimension: S7
    requiresDB: true
    note: "写 audit_logs(action=admin.logout)"
    auth: { role: super_admin }
    request:
      method: POST
      path: /api/admin/auth/logout
      body: {}
    expect:
      status: 200

  # ───────────────────────── 4. POST /auth/feishu/callback（公开）
  - name: feishu_callback_mock_success
    dimension: S1
    requiresDB: true
    fixture: common/auth/feishu
    note: "dev+ADMIN_FEISHU_MOCK=true，code=mock:alice 命中已绑定身份 → 200"
    request:
      method: POST
      path: /api/admin/auth/feishu/callback
      body: { code: "mock:alice" }
