services:
  postgres:
    image: postgres:16-alpine
    container_name: console-test-pg
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: admin_console
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d admin_console"]
      interval: 2s
      timeout: 3s
      retries: 30
